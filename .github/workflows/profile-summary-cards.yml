name: Generate GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@v0.0.11
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: 5.5
          AUTO_PUSH: true
          EXCLUDE: ""
          FORKED_REPOS: false
          GENERATED_COMMITS: true
          ORG_REPOS: true
          REPOS: true
          THEME: github
