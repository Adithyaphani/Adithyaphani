name: Generate GitHub Activity Radar

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate activity radar SVG
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        run: |
          python scripts/generate_activity_radar.py

      - name: Commit generated radar chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/github-activity-radar.svg

          git diff --cached --quiet || git commit -m "chore: update GitHub activity radar"

          git push
